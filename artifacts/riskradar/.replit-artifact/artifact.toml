kind = "web"
previewPath = "/"
title = "RiskRadar"
version = "1.0.0"
id = "artifacts/riskradar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23316
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/riskradar run dev"

[services.env]
PORT = "23316"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/riskradar", "run", "build"]
publicDir = "artifacts/riskradar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
